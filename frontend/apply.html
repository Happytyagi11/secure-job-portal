<!DOCTYPE html>
<html>
<head>

</head>

<body>

  <div class="container">
    <h2>Apply for a Job</h2>

    <form id="applyForm" enctype="multipart/form-data">

    <div class="nav-links">
      <a href="index.html">Back to Home</a>
    </div>
  </div>

  <script src="assets/js/app.js"></script>

</html>
